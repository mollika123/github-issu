<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

  <!-- tailwind+daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body>
  <header class="border-b-2">
    <div class="bg-base-100 w-11/12 mx-auto align-center items-center pt-[10px] pb-[10px] ">
      <div class="flex flex-col gap-4 md:flex-row md:justify-between md:items-center">
        <!-- <div class="flex flex-row md:flex-col"></div> -->
        <div class="flex items-center gap-2"><img src="assets/github-logo.png" alt="">
          <h2 class="text-[#1F2937] text-3xl font-semibold text-center">GitHub Issues Tracker</h2>
        </div>
        <div class="flex justify-center items-center gap-[20px]">
          <div>

            <div class="">
              <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                    stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </g>
                </svg>
                <input type="search" id="input-search" required placeholder="Search" />
              </label>
            </div>

            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button id="btn-search" class="btn btn-primary">Search</button>
        </div>
      </div>
    </div>
  </header>

  <section class="pt-[60px]  ">
    <div class="tab-section w-10/12 mx-auto flex gap-2 bg-base-100 p-[24px] rounded-[10px] shadow-lg ">
      <button id="AllBtn" onclick="toggleStyle('AllBtn')"
        class="btn btn-primary w-[120px] border-1 border-gray-200 shadow-none ">All</button>
      <button id="openBtn" onclick="toggleStyle('openBtn')" class="btn w-[120px] ">Open</button>
      <button id="closeBtn" onclick="toggleStyle('closeBtn')" class="btn w-[120px] ">Closed</button>
    </div>
  </section>

  <section class="  py-[16px]">
    <div class=" issues-summary w-10/12 mx-auto bg-base-100 p-[24px] rounded-t-lg shadow-md ">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-1">
          <div class=""><img src="assets/Aperture.png" alt="">
          </div>
          <div class="">
            <h2 class="text-[20px] font-semibold" id="issu-counter"> </h2>
            <h3 class="text-[##64748B]">Track and manage your project issues</h3>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <div class="w-[20px] h-[20px] bg-[#00A96E] rounded-full"></div>
          <div class="">Open</div>
          <div class="w-[20px] h-[20px] bg-[#A855F7] rounded-full"></div>
          <div class="">Closed</div>
        </div>
      </div>
    </div>
  </section>


  <!-- spinner -->

  <section id="spinner" class="flex justify-center items-center py-10  ">
    <span class="loading loading-bars loading-xl"></span>
  </section>

  <section class="bg-base-200 w-10/12 mx-auto mt-8">
    <div id="issue-container" class="  grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4  gap-4 bg-white  p-2">

    </div>
  </section>



  <!-- modal -->
  <!-- Open the modal using ID.showModal() method -->
  <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
  <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <div id="details-container">



      </div>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn btn-primary">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  <script src="js/issus.js"></script>
</body>

</html>
